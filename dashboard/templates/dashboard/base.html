{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { display: flex; min-height: 100vh; background-color: #f8f9fa; }
    .sidebar {
      width: 240px;
      background: #0d6efd;
      color: white;
      padding: 20px;
    }
    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px 0;
    }
    .sidebar a:hover {
      text-decoration: underline;
    }
    .content {
      flex-grow: 1;
      padding: 30px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h4>Dashboard</h4>
   <nav class="sidebar">
  <ul>
    <li><a href="{% url 'dashboard_home' %}">Home</a></li>
    <li><a href="{% url 'dashboard_reports' %}">Reports</a></li>
    <li><a href="{% url 'staff_list' %}">Staff</a></li>
    <li class="nav-item">
    <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="background:none;border:none;color:#007bff;cursor:pointer;">
        Logout
    </button>
</form>

</li>

  </ul>
</nav>

  </div>

  <div class="content">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
