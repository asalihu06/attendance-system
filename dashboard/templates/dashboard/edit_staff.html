{% extends 'dashboard/base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="row">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0" style="background-color: #fff;">
        <div class="card-body">
          <h4 class="card-title mb-4 text-dark">Add New Staff</h4>

          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
              <div class="mb-3">
                <label class="form-label fw-semibold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                  <small class="form-text text-muted">{{ field.help_text }}</small>
                {% endif %}
                {% for error in field.errors %}
                  <div class="text-danger small">{{ error }}</div>
                {% endfor %}
              </div>
            {% endfor %}

            <div class="d-flex justify-content-start mt-4">
              <button type="submit" class="btn btn-success me-2 px-4">Save</button>
              <a href="{% url 'staff_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
